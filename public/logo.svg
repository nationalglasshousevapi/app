<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Glass icon -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#046380"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <!-- Window/glass pane icon -->
  <rect x="12" y="12" width="72" height="72" rx="8" stroke="url(#g)" stroke-width="5" fill="rgba(4,99,128,0.06)"/>
  <line x1="48" y1="12" x2="48" y2="84" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="12" y1="48" x2="84" y2="48" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Reflection highlight -->
  <line x1="20" y1="20" x2="36" y2="36" stroke="rgba(4,99,128,0.2)" stroke-width="3" stroke-linecap="round"/>
  <!-- Company name -->
  <text x="108" y="50" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="28" font-weight="700" fill="#046380" letter-spacing="-0.5">National Glass House</text>
  <!-- Tagline -->
  <text x="108" y="76" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="13" fill="#64748b" letter-spacing="0.3">Invoicing &amp; Document Management</text>
  <!-- Bottom bar -->
  <rect x="108" y="88" width="40" height="3" rx="1.5" fill="#046380" opacity="0.3"/>
</svg>
