<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 580">
  <!-- Background -->
  <rect x="0" y="0" width="1800" height="580" fill="#155d70"/>

  <!-- House roof outline -->
  <polyline points="700,235 900,45 1000,140 1000,90 1075,165 1075,235"
            fill="none" stroke="#ffffff" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Door / window rectangle under the roof peak -->
  <rect x="862" y="165" width="76" height="130" fill="#ffffff"/>

  <!-- Left double horizontal line -->
  <rect x="40" y="230" width="620" height="14" fill="#ffffff"/>
  <rect x="40" y="262" width="620" height="14" fill="#ffffff"/>

  <!-- Right double horizontal line -->
  <rect x="1120" y="230" width="640" height="14" fill="#ffffff"/>
  <rect x="1120" y="262" width="640" height="14" fill="#ffffff"/>

  <!-- Wordmark -->
  <text x="900" y="470"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-style="italic"
        font-size="150"
        fill="#ffffff"
        letter-spacing="-2">national glass house</text>
</svg>
